version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: netflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-netflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-netflow}
      POSTGRES_DB: ${POSTGRES_DB:-netflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/indexes.sql:/docker-entrypoint-initdb.d/02-indexes.sql:ro
      - ./db/views.sql:/docker-entrypoint-initdb.d/03-views.sql:ro
      - ./db/triggers.sql:/docker-entrypoint-initdb.d/04-triggers.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-netflow} -d ${POSTGRES_DB:-netflow}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
