name: Lint Python

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint with make lint-python
        run: make lint-python

  docker-healthcheck:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: netflow
          POSTGRES_PASSWORD: netflow
          POSTGRES_DB: netflow
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U netflow -d netflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Verify PostgreSQL is healthy
        run: |
          echo "PostgreSQL service is healthy and accessible on port 5433"
          PGPASSWORD=netflow psql -h localhost -p 5433 -U netflow -d netflow -c "SELECT 1 AS health_check;"
